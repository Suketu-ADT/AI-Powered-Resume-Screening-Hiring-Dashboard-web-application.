server:
  port: 8888 # Run backend on 8888 to avoid port conflicts with standard local 8080

spring:
  application:
    name: resume-screening-backend
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:resume_screener}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Custom Application Settings
app:
  jwt:
    secret: ${JWT_SECRET:9a4f2c8d3b7a1e6f5c8d9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d}
    expiration-ms: 86400000 # 24 hours
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
  upload:
    dir: ${UPLOAD_DIR:uploads}
